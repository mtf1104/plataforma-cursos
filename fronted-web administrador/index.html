<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Administración - EduPlatform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">EduPlatform - Admin</div>
    </nav>

    <main id="app-content">
        <div class="auth-container">
            <h2 id="form-title">Acceso Administrativo</h2>
            
            <form id="auth-form">
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" id="submit-btn">Ingresar al Panel</button>
            </form>
            
            <p id="auth-message" style="font-weight: bold;"></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
