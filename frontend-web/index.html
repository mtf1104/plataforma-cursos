<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Educación en Línea</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>

    <nav>
        <div class="logo">EduPlatform</div>
        <ul id="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#" id="login-link">Iniciar Sesión</a></li>
        </ul>
    </nav>

    <main id="app-content">
        <div class="auth-container">
            <h2 id="form-title">Iniciar Sesión</h2>
            
            <form id="auth-form">
                <div id="name-group" style="display: none;">
                    <label for="name">Nombre completo:</label>
                    <input type="text" id="name">
                </div>
                
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" id="submit-btn">Entrar</button>
            </form>
            
            <p>
                <span id="toggle-text">¿No tienes cuenta?</span> 
                <a href="#" id="toggle-link">Regístrate aquí</a>
            </p>
            
            <p id="auth-message" style="font-weight: bold;"></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
